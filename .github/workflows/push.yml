name: Push
on: push

env:
  PAGE_URL: http://example.com/foo/

jobs:
  check:
    runs-on: ubuntu-latest
    environment:
      name: testytest
    steps:
      - run: |
          set -e ${RUNNER_DEBUG:+-x}
          curl https://bux.re

  events:
    runs-on: ubuntu-latest
    steps:
      - id: get_url
        name: Get page URL
        run: |
          url=$(sed 's/^http:/https:/' <<< "${{ env.environment_url || env.PAGE_URL }}")
          echo "url=$url" >> $GITHUB_OUTPUT
          echo $url

  toml:
    runs-on: ubuntu-latest
    steps:
      - name: Set up git repo
        uses: actions/checkout@v5

      - name: Parse toml
        id: toml
        uses: sebrollen/toml-action@v1.2.0
        with:
          file: test.toml
          field: ${{ true && 'route' || 'env.test.route' }}

      - name: Output value
        run: echo ${{ steps.toml.outputs.value }}
